<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                width: 360px;
                max-height: 500px;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #ffffff;
                color: #1a1a1a;
                overflow-y: auto;
            }

            header {
                padding: 14px 16px;
                font-size: 14px;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #666;
                border-bottom: 1px solid #e5e5e5;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            header span {
                color: #1a1a1a;
            }

            #list {
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .card {
                background: #f9f9f9;
                border: 1px solid #e0e0e0;
                border-radius: 8px;
                padding: 10px 12px;
                cursor: pointer;
                transition: border-color 0.15s;
            }

            .card:hover {
                border-color: #999;
            }

            .card-text {
                font-size: 13px;
                line-height: 1.5;
                color: #333;
                display: -webkit-box;
                -webkit-line-clamp: 3;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            .card-meta {
                margin-top: 7px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 11px;
                color: #666;
            }

            .card-meta a {
                color: #666;
                text-decoration: none;
                max-width: 200px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .card-meta a:hover {
                color: #333;
            }

            .delete-btn {
                background: none;
                border: none;
                color: #999;
                cursor: pointer;
                font-size: 13px;
                padding: 0 2px;
                line-height: 1;
            }
            .delete-btn:hover {
                color: #dc3545;
            }

            .empty {
                padding: 32px 16px;
                text-align: center;
                color: #999;
                font-size: 13px;
            }
        </style>
    </head>
    <body>
        <header>Memry <span id="count">0 saved</span></header>
        <div id="list"></div>
        <script src="popup.js"></script>
    </body>
</html>
